# CineSync configuration
# Everything here is read once per notebook run via src/config_loader.py

project:
  name: cinesync
  version: 0.1.0

people:
  - id: person_1
    name: "Name 1"
  - id: person_2
    name: "Name 2"
  # - id: person_3
  #   name: "Add more rows here for additional group members"

tmdb_discover:
  votes:
    min_vote_count: 50

  rating:
    min_rating: 6.5   # Float: 0-10 scale
    min_vote_count: 10

  lang:
    - lang: hi  # Hindi
      min_vote_count: 5
      min_release: "1940-01-01"
    - lang: ur  # Urdu
      min_vote_count: 0
      min_release: "1940-01-01"
    - lang: ko  # Korean
      min_vote_count: 10
      min_release: "1940-01-01"
    - lang: ja  # Japanese
      min_vote_count: 10
      min_release: "1940-01-01"

# Phase 8. Normalized to 0-100 per source before weighting; weight is
# redistributed proportionally if a source is missing for a title.
critic_score_weights:
  letterboxd_rating: 0.35
  rt_critic: 0.35
  rt_audience: 0.10
  imdb_rating: 0.10
  tmdb_rating: 0.10

recommendations_discovery:
  # TMDB's /recommendations endpoint sweep settings
  min_rating: 4.0           # seed from titles rated at/above this (0-5 scale)
  max_pages_per_seed: 2     # TMDB's relevance ordering means page 1-2 carries most of the signal

# Per-service network pacing + retry, consumed by cinesync.utils.net.paced_request.
# Edit the numbers for a given API here; endpoint URLs and User-Agent strings
# live in code (the fetch modules), not config.
rate_limiting:
  tmdb:
    min_interval: 0.15   # ~6-7 req/s, well under TMDB's ~40-50 req/s ceiling
    max_retries: 5
    timeout: [10, 30]    # (connect, read) seconds
  wikidata:
    min_interval: 1.0    # WDQS: single-threaded, ~1 req/s
    max_retries: 4
    timeout: 60          # matches WDQS's server-side query timeout
    batch_size: 40       # Q-ids per SPARQL query; keeps award fan-out under the 60s timeout
  wikipedia:
    min_interval: 0.5    # anonymous api.php -- keep gentle
    max_retries: 4
    timeout: 30
  # IMDb + Letterboxd are both curl_cffi async scrapers (AsyncSession + semaphore),
  # so they share one vocabulary. min_interval is a GLOBAL even-spacing floor
  # between outbound requests (all coroutines), concurrency caps in-flight requests.
  imdb:
    concurrency: 5
    min_interval: 0.125   # ~8 req/s global cap across the pool
    max_retries: 4
    timeout: 25
  letterboxd:
    concurrency: 8
    min_interval: 0.2     # ~5 req/s global cap; tune up/down to taste (was jittered)
    max_retries: 4
    timeout: 15
  # rotten_tomatoes: reserved -- add when the RT link/ratings fetcher exists.


thresholds:
  # Below this many ratings, Phase 4 skips that person's personal
  # model and falls back to Phase 3 cluster-based suggestions instead.
  min_ratings_for_personal_model: 30

recency:
  # Default half-life used by recommend() when recency_half_life isn't
  # specified -- see src/recency.py. Override per-call with a preset
  # ('2d','1w','2w','1m','3m','6m','1y','2y','lifetime') or a raw
  # number of days for finer control.
  default_half_life_days: 90

embeddings:
  # keywords + genres + tagline + logline/brief plot - > theme and mood
  model_theme: "all-MiniLM-L6-v2"
  # Plot synopsis -> events simantic search
  model_plot: "nomic-embed-text-v1.5"
  # IMPORTANT: if you ever swap this model, old and new embeddings are
  # NOT comparable. Re-run Phase 2 for every title if you change this,
  # or keep two columns (old/new) during a transition.

apis:
  tmdb_api_key: ${TMDB_API_KEY}
  reddit:
    client_id: ${REDDIT_CLIENT_ID}
    client_secret: ${REDDIT_CLIENT_SECRET}
    user_agent: "cinesync/0.1 by ${REDDIT_USERNAME}"